<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信对话</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="wechat-container">
        <!-- 状态栏模拟 -->
        <div class="status-bar">
            <span class="time" id="current-time">17:05</span>
            <div class="status-icons">
                <svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align: middle; margin-right: 4px;">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z" />
                </svg> 5G
            </div>
        </div>
        <!-- 头部 -->
        <header class="wechat-header">
            <div class="back-icon">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z" />
                </svg>
            </div>
            <div class="contact-name">文件传输助手</div>
            <div class="more-icon">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path
                        d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" />
                </svg>
            </div>
        </header>

        <!-- 聊天记录区域 -->
        <main class="chat-area" id="chat-area">
            <!-- 消息会动态插入到这里 -->
        </main>

        <!-- 交互按钮区域 (浮动在输入框上方) -->
        <div class="action-overlay" id="action-overlay">
            <div class="options-container" id="options-container">
                <!-- 按钮会动态插入到这里 -->
            </div>
        </div>

        <!-- 底部输入框 -->
        <footer class="wechat-footer">
            <div class="footer-icon-circle" id="voice-btn">
                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6,13h1v-2H6V13z M12,2c-5.5,0-10,4.5-10,10s4.5,10,10,10s10-4.5,10-10S17.5,2,12,2z M12,20c-4.4,0-8-3.6-8-8s3.6-8,8-8s8,3.6,8,8 S16.4,20,12,20z M11,13h2v-2h-2V13z M17,13h1v-2h-1V13z"/></svg>
            </div>
            <div class="input-box"></div>
            <div class="footer-icon" id="emoji-toggle">
                <svg id="emoji-icon" viewBox="0 0 24 24" width="28" height="28"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
                <svg id="keyboard-icon" style="display:none" viewBox="0 0 24 24" width="28" height="28"><path d="M20 5H4c-1.1 0-1.99.9-1.99 2L2 17c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-9 3h2v2h-2V8zm0 3h2v2h-2v-2zM8 8h2v2H8V8zm0 3h2v2H8v-2zm-1 2H5v-2h2v2zm0-3H5V8h2v2zm9 7H8v-2h8v2zm0-4h-2v-2h2v2zm0-3h-2V8h2v2zm3 3h-2v-2h2v2zm0-3h-2V8h2v2z"/></svg>
            </div>
            <div class="footer-icon" id="plus-btn">
                <svg viewBox="0 0 24 24" width="28" height="28"><path d="M13,7h-2v4H7v2h4v4h2v-4h4v-2h-4V7z M12,2C6.48,2,2,6.48,2,12s4.48,10,10,10s10-4.48,10-10S17.52,2,12,2z M12,20c-4.41,0-8-3.59-8-8s3.59-8,8-8s8,3.59,8,8S16.41,20,12,20z"/></svg>
            </div>
        </footer>

        <!-- 表情面板 -->
        <div class="emoji-panel" id="emoji-panel">
            <div class="emoji-title">添加的单个表情</div>
            <div class="emoji-grid" id="emoji-grid">
                <!-- 动态生成的表情图片 -->
            </div>
            <div class="emoji-tabs">
                <div class="tab-icon active"><svg viewBox="0 0 24 24" width="18" height="18"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
                <div class="tab-icon"><svg viewBox="0 0 24 24" width="18" height="18"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg></div>
                <div class="tab-icon"><svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
